<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Life Map</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life Map">
<meta name="theme-color" content="#1E1A14">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Sans+JP:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --ink:     #1C2B3A;
  --parch:   #EEF4F8;
  --parch2:  #DDE8EF;
  --paper:   #F7FAFB;
  --line:    #C8DCE8;
  --gold:    #4A9BAA;
  --gold-lt: #62B4C4;
  --muted:   #6A8898;
  --faint:   #96B4C4;

  --taste:    #7A9EC4;
  --narrative:#5A9E8A;
  --ajito:    #7A7EC4;
  --gear:     #5A8EAA;
  --aura:     #8A9EBA;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--parch);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}

/* HEADER */
#hdr{background:linear-gradient(135deg,#1C2B3A 0%,#2A4A5A 100%);padding:18px 18px 14px;position:sticky;top:0;z-index:30;}
#hdr-inner{max-width:680px;margin:0 auto;}
#hdr-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:10px;}
#app-title{font-family:'Cinzel',serif;font-size:18px;font-weight:600;color:var(--gold-lt);letter-spacing:.1em;line-height:1.2;}
#app-sub{font-size:11px;color:#6A6050;margin-top:3px;}
#hdr-btns{display:flex;gap:6px;flex-shrink:0;}
.btn-hdr{border:1px solid rgba(184,146,74,.3);color:var(--gold-lt);background:rgba(184,146,74,.08);border-radius:10px;padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn-hdr.primary{background:var(--gold);border-color:var(--gold);color:var(--ink);}
.btn-hdr.icon{padding:8px 10px;font-size:14px;background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:#8A7E64;}
#hdr-search{width:100%;padding:9px 14px;border-radius:10px;border:none;background:rgba(255,255,255,.06);color:#C8B888;font-size:13px;outline:none;font-family:inherit;}
#hdr-search::placeholder{color:#4A4030;}

/* TABS */
#tabs-wrap{background:var(--paper);border-bottom:1px solid var(--line);overflow-x:auto;}
#tabs{max-width:680px;margin:0 auto;display:flex;padding:0 14px;}
.tab{padding:10px 11px;font-size:12px;color:var(--faint);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;}
.tab.active{font-weight:700;color:var(--ink);border-bottom-color:var(--gold);}

/* MAIN */
#main{max-width:680px;margin:0 auto;padding:18px 14px 80px;}

/* DREAM CARDS */
.dream-card{border-radius:16px;margin-bottom:12px;overflow:hidden;box-shadow:0 2px 16px rgba(30,26,20,.1);border:1px solid var(--line);}
.dream-hero{height:110px;position:relative;display:flex;align-items:flex-end;padding:12px 14px;overflow:hidden;}
.dream-hero-img{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;}
.dream-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(20,40,60,.65) 0%,rgba(20,40,60,.15) 60%,transparent 100%);}
.dream-realm-badge{position:absolute;top:10px;right:10px;font-family:'EB Garamond',serif;font-size:11px;letter-spacing:.12em;color:rgba(255,255,255,.8);background:rgba(0,0,0,.3);border-radius:20px;padding:3px 10px;z-index:1;}
.dream-title{font-family:'Cinzel',serif;font-size:15px;font-weight:600;color:#FAF6EC;position:relative;z-index:1;text-shadow:0 1px 6px rgba(0,0,0,.5);line-height:1.3;}
.dream-body{background:var(--paper);padding:12px 14px;}
.dream-desc{font-size:12px;color:var(--muted);line-height:1.65;margin-bottom:10px;}
.dream-footer{display:flex;align-items:center;justify-content:space-between;}
.dream-quest-stat{font-size:11px;color:var(--gold);font-weight:600;}
.dream-btns{display:flex;gap:7px;}
.btn-sm{font-size:11px;padding:5px 11px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;}
.btn-sm.ghost{background:transparent;border:1px solid var(--line);color:var(--muted);}
.btn-sm.gold{background:var(--gold);border:none;color:var(--ink);}
.btn-sm.danger{background:transparent;border:1px solid #90B8C8;color:#2A6A8A;}

/* HERO GRADIENTS */
.hero-taste{background:linear-gradient(135deg,#2A4A6A 0%,#5A8EBA 100%);}
.hero-narrative{background:linear-gradient(135deg,#1A4A3A 0%,#4A9A7A 100%);}
.hero-ajito{background:linear-gradient(135deg,#2A3A6A 0%,#5A6AAA 100%);}
.hero-gear{background:linear-gradient(135deg,#1A3A4A 0%,#4A7A9A 100%);}
.hero-aura{background:linear-gradient(135deg,#2A3A5A 0%,#6A8AAA 100%);}

/* PROJECT SECTION */
.proj-section{margin-bottom:20px;}
.proj-hdr{display:flex;align-items:center;gap:8px;margin-bottom:9px;cursor:pointer;padding:4px 0;}
.proj-badge{font-size:12px;font-weight:700;letter-spacing:.04em;padding:5px 12px;border-radius:20px;background:rgba(74,155,170,.1);color:var(--gold);border:1px solid rgba(74,155,170,.25);}
.proj-count{font-size:11px;color:var(--faint);}
.proj-toggle{font-size:10px;color:var(--faint);margin-left:auto;}
.proj-list{display:flex;flex-direction:column;gap:8px;}
.proj-list.collapsed{display:none;}

/* QUEST SECTION */
.quest-section{margin-bottom:18px;}
.quest-sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:9px;cursor:pointer;padding:2px 0;}
.quest-sec-badge{font-size:11px;font-weight:700;letter-spacing:.06em;padding:4px 11px;border-radius:20px;}
.quest-sec-count{font-size:11px;color:var(--faint);}
.quest-sec-toggle{font-size:10px;color:var(--faint);margin-left:auto;}
.quest-list{display:flex;flex-direction:column;gap:8px;}
.quest-list.collapsed{display:none;}

/* QUEST CARD */
.quest-card{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:12px 13px;display:flex;flex-direction:column;gap:7px;transition:opacity .2s;}
.quest-card.done{opacity:.45;}
.quest-card-top{display:flex;align-items:flex-start;gap:9px;}
.quest-check{width:19px;height:19px;min-width:19px;border-radius:5px;border:1.5px solid var(--line);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;margin-top:2px;transition:all .15s;flex-shrink:0;}
.quest-check.done{border-color:#4A9BAA;background:#4A9BAA;}
.quest-body{flex:1;min-width:0;}
.quest-title{font-size:14px;font-weight:600;color:var(--ink);line-height:1.4;word-break:break-word;}
.quest-card.done .quest-title{text-decoration:line-through;color:var(--faint);}
.quest-price{font-size:13px;font-weight:700;color:var(--gold);margin-top:2px;}
.quest-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.quest-tag{font-size:10px;border-radius:20px;padding:2px 8px;font-weight:600;letter-spacing:.04em;}
.quest-actions{display:flex;gap:4px;flex-shrink:0;}
.quest-edit{background:none;border:none;color:var(--faint);cursor:pointer;font-size:14px;padding:0 3px;}
.quest-del{background:none;border:none;color:#96B4C4;cursor:pointer;font-size:17px;padding:0 2px;}
.quest-memo{font-size:12px;color:var(--muted);line-height:1.65;padding-left:28px;}
.quest-links{display:flex;flex-direction:column;gap:5px;padding-left:28px;}
.quest-link{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--parch);border:1px solid var(--line);border-radius:8px;text-decoration:none;color:var(--ink);font-size:11px;overflow:hidden;}
.quest-link-domain{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.quest-img{margin-left:28px;border-radius:8px;overflow:hidden;max-height:160px;}
.quest-img img{width:100%;height:160px;object-fit:cover;display:block;}
.quest-date{font-size:10px;color:var(--faint);padding-left:28px;}

/* TYPE COLORS */
.type-armor{background:rgba(74,155,170,.12);color:#2A7A8A;border:1px solid rgba(74,155,170,.3);}
.type-weapon{background:rgba(90,142,170,.12);color:#2A5A7A;border:1px solid rgba(90,142,170,.3);}
.type-skill{background:rgba(90,158,138,.12);color:#2A6A5A;border:1px solid rgba(90,158,138,.3);}
.type-dungeon{background:rgba(122,126,196,.12);color:#4A4A9A;border:1px solid rgba(122,126,196,.3);}
.type-guild{background:rgba(74,130,170,.12);color:#2A5A8A;border:1px solid rgba(74,130,170,.3);}
.type-tome{background:rgba(90,110,170,.12);color:#3A4A8A;border:1px solid rgba(90,110,170,.3);}
.realm-taste{background:rgba(122,158,196,.15);color:var(--taste);}
.realm-narrative{background:rgba(90,158,138,.15);color:var(--narrative);}
.realm-ajito{background:rgba(122,126,196,.15);color:var(--ajito);}
.realm-gear{background:rgba(90,142,170,.15);color:var(--gear);}
.realm-aura{background:rgba(138,158,186,.15);color:var(--aura);}
.pri-now{background:rgba(90,140,200,.15);color:#2A5A9A;border:1px solid rgba(90,140,200,.3);}
.pri-soon{background:rgba(74,155,170,.15);color:#2A7A8A;border:1px solid rgba(74,155,170,.3);}
.pri-someday{background:rgba(90,158,138,.15);color:#2A6A5A;border:1px solid rgba(90,158,138,.3);}

/* INBOX (手配書) */
.inbox-card{background:var(--paper);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:13px;padding:12px 13px;display:flex;flex-direction:column;gap:7px;}
.inbox-card-top{display:flex;align-items:flex-start;gap:9px;}
.inbox-body{flex:1;min-width:0;}
.inbox-title{font-size:14px;font-weight:600;color:var(--ink);line-height:1.4;}
.inbox-date{font-size:10px;color:var(--faint);}
.inbox-actions{display:flex;gap:6px;flex-shrink:0;}

/* EMPTY */
#empty{text-align:center;padding:60px 20px;}
#empty-icon{font-size:38px;margin-bottom:12px;opacity:.45;}
#empty-text{font-size:14px;color:var(--muted);line-height:1.7;}

/* MODAL */
.m-overlay{position:fixed;inset:0;background:rgba(20,16,10,.65);z-index:100;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px);}
.m-overlay.open{display:flex;}
.m-sheet{background:var(--paper);border-radius:22px 22px 0 0;padding:22px 18px 44px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column;gap:13px;}
.m-center{position:fixed;inset:0;background:rgba(20,16,10,.65);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
.m-center.open{display:flex;}
.m-box{background:var(--paper);border-radius:18px;padding:22px 18px;width:100%;max-width:460px;display:flex;flex-direction:column;gap:13px;max-height:90vh;overflow-y:auto;}
.m-title{font-family:'Cinzel',serif;font-size:15px;font-weight:600;color:var(--ink);letter-spacing:.07em;}
.m-field label{display:block;font-size:10px;font-weight:700;color:var(--faint);margin-bottom:5px;letter-spacing:.09em;text-transform:uppercase;}
.m-field input,.m-field textarea,.m-field select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;color:var(--ink);background:#FFF;outline:none;font-family:inherit;}
.m-field input:focus,.m-field textarea:focus,.m-field select:focus{border-color:var(--gold);}
.m-field textarea{resize:vertical;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{font-size:12px;padding:5px 13px;border-radius:20px;cursor:pointer;font-family:inherit;border:1px solid var(--line);background:var(--parch2);color:var(--muted);transition:all .15s;font-weight:500;}
.chip.sel{background:var(--ink);color:var(--parch);border-color:var(--ink);}
.m-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:4px;}
.btn-cancel{font-size:14px;padding:10px 17px;border-radius:10px;background:var(--parch2);color:var(--muted);border:none;cursor:pointer;font-family:inherit;}
.btn-commit{font-size:14px;padding:10px 20px;border-radius:10px;background:var(--ink);color:var(--parch);border:none;font-weight:600;font-family:inherit;cursor:pointer;}
.btn-commit:disabled{opacity:.3;cursor:not-allowed;}
.realm-chip{font-size:12px;padding:5px 13px;border-radius:20px;cursor:pointer;font-family:inherit;border:1px solid transparent;transition:all .15s;opacity:.55;font-weight:600;letter-spacing:.04em;}
.realm-chip.sel{opacity:1;}
.type-chip{font-size:12px;padding:6px 13px;border-radius:20px;cursor:pointer;font-family:inherit;border:1px solid var(--line);background:var(--parch2);color:var(--muted);transition:all .15s;font-weight:500;opacity:.65;}
.type-chip.sel{opacity:1;font-weight:700;}
.sub-chip{font-size:11px;padding:4px 10px;border-radius:20px;cursor:pointer;font-family:inherit;border:1px solid var(--line);background:transparent;color:var(--muted);transition:all .15s;}
.sub-chip.sel{background:var(--ink);color:var(--parch);border-color:var(--ink);}

/* LINKS INPUT */
.link-input-row{display:flex;gap:6px;align-items:center;}
.link-input-row input{flex:1;padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-size:13px;color:var(--ink);background:#FFF;outline:none;font-family:inherit;}
.link-input-row input:focus{border-color:var(--gold);}
.link-add-btn{padding:9px 12px;background:var(--ink);color:var(--parch);border:none;border-radius:10px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.link-list{display:flex;flex-direction:column;gap:5px;margin-top:6px;}
.link-item{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--parch);border:1px solid var(--line);border-radius:8px;font-size:12px;color:var(--muted);}
.link-item-domain{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.link-item-del{background:none;border:none;color:#C4B090;cursor:pointer;font-size:14px;flex-shrink:0;}

/* IMAGE INPUT */
.img-preview{margin-top:8px;border-radius:10px;overflow:hidden;max-height:140px;position:relative;}
.img-preview img{width:100%;height:140px;object-fit:cover;display:block;}
.img-preview-del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.img-upload-btn{width:100%;padding:10px;border:1px dashed var(--line);border-radius:10px;background:transparent;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;text-align:center;}

/* SETTINGS */
.st-url-box{background:var(--parch2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--ink);word-break:break-all;line-height:1.5;font-family:monospace;}
.st-copy-btn{width:100%;padding:11px;background:var(--ink);color:var(--parch);border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.st-steps{background:var(--parch);border:1px solid var(--line);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:10px;}
.st-step{display:flex;gap:10px;align-items:flex-start;}
.st-step-num{width:22px;height:22px;min-width:22px;background:var(--gold);color:var(--ink);border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.st-step-text{font-size:12px;color:var(--muted);line-height:1.6;}
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-inner">
    <div id="hdr-top">
      <div>
        <div id="app-title">✦ Life Map</div>
        <div id="app-sub">—</div>
      </div>
      <div id="hdr-btns">
        <button class="btn-hdr icon" onclick="openSettings()">⚙</button>
        <button class="btn-hdr" onclick="openDreamModal()">夢を記す</button>
        <button class="btn-hdr" onclick="openProjModal()">＋ 作戦</button>
        <button class="btn-hdr primary" onclick="openQuestModal()">＋</button>
      </div>
    </div>
    <input id="hdr-search" type="search" placeholder="記録を探す..." oninput="render()">
  </div>
</div>

<div id="tabs-wrap">
  <div id="tabs">
    <button class="tab active" onclick="setTab('all',this)">すべて</button>
    <button class="tab" onclick="setTab('inbox',this)">📋 手配書</button>
    <button class="tab" onclick="setTab('projects',this)">🗂 作戦</button>
    <button class="tab" onclick="setTab('armor',this)">⚔️ 装備</button>
    <button class="tab" onclick="setTab('weapon',this)">🪄 武器</button>
    <button class="tab" onclick="setTab('skill',this)">📜 スキル</button>
    <button class="tab" onclick="setTab('dungeon',this)">🏰 ダンジョン</button>
    <button class="tab" onclick="setTab('guild',this)">🍺 ギルド酒場</button>
    <button class="tab" onclick="setTab('tome',this)">📖 魔導書</button>
    <button class="tab" onclick="setTab('dreams',this)">🗺 夢の地図</button>
  </div>
</div>

<div id="main">
  <div id="card-list"></div>
  <div id="empty" style="display:none">
    <div id="empty-icon">✦</div>
    <div id="empty-text">まだ記録がありません。<br>「＋」から冒険を始めよう。</div>
  </div>
</div>

<!-- Quest Modal -->
<div class="m-overlay" id="qm-overlay" onclick="if(event.target===this)closeQuestModal()">
  <div class="m-sheet">
    <div class="m-title" id="qm-label">クエストを記録する</div>
    <div class="m-field">
      <label>タイトル *</label>
      <input id="qm-title" type="text" placeholder="例：白シャツを探す">
    </div>
    <div class="m-field">
      <label>種別</label>
      <div class="chips" id="qm-type-chips"></div>
    </div>
    <div class="m-field">
      <label>サブカテゴリ</label>
      <div class="chips" id="qm-sub-chips"></div>
    </div>
    <div class="m-field">
      <label>リンク</label>
      <div class="link-input-row">
        <input id="qm-link-input" type="url" placeholder="https://...">
        <button class="link-add-btn" onclick="addQuestLink()">追加</button>
      </div>
      <div class="link-list" id="qm-link-list"></div>
    </div>
    <div class="m-field">
      <label>画像</label>
      <input type="file" id="qm-img-file" accept="image/*" style="display:none" onchange="handleImgUpload(event)">
      <button class="img-upload-btn" onclick="document.getElementById('qm-img-file').click()">📷 カメラロールから選ぶ</button>
      <div class="img-preview" id="qm-img-preview" style="display:none">
        <img id="qm-img-el" src="" alt="">
        <button class="img-preview-del" onclick="removeImg()">×</button>
      </div>
    </div>
    <div class="m-field">
      <label>価格（円）</label>
      <input id="qm-price" type="number" placeholder="例：24800">
    </div>
    <div class="m-field">
      <label>作戦</label>
      <select id="qm-proj"><option value="">紐づけない</option></select>
    </div>
    <div class="m-field">
      <label>優先度</label>
      <div class="chips" id="qm-pri-chips"></div>
    </div>
    <div class="m-field">
      <label>メモ</label>
      <textarea id="qm-memo" rows="2" placeholder="思ったこと、感じたことなど..."></textarea>
    </div>
    <div class="m-actions">
      <button class="btn-cancel" onclick="closeQuestModal()">もどる</button>
      <button class="btn-commit" id="qm-save" onclick="saveQuest()" disabled>記録する</button>
    </div>
  </div>
</div>

<!-- Inbox Modal -->
<div class="m-overlay" id="ibm-overlay" onclick="if(event.target===this)closeInboxModal()">
  <div class="m-sheet">
    <div class="m-title">手配書に書き留める</div>
    <div class="m-field">
      <label>タイトル *</label>
      <input id="ibm-title" type="text" placeholder="例：あのブランドのジャケット">
    </div>
    <div class="m-field">
      <label>リンク（任意）</label>
      <input id="ibm-url" type="url" placeholder="https://...">
    </div>
    <div class="m-field">
      <label>メモ（任意）</label>
      <textarea id="ibm-memo" rows="2" placeholder="気になった理由など..."></textarea>
    </div>
    <div class="m-actions">
      <button class="btn-cancel" onclick="closeInboxModal()">もどる</button>
      <button class="btn-commit" id="ibm-save" onclick="saveInbox()" disabled>書き留める</button>
    </div>
  </div>
</div>

<!-- Promote Modal (inbox → quest) -->
<div class="m-center" id="pm-overlay" onclick="if(event.target===this)closePromoteModal()">
  <div class="m-box">
    <div class="m-title">クエストに昇格する</div>
    <div class="m-field">
      <label>種別</label>
      <div class="chips" id="pm-type-chips"></div>
    </div>
    <div class="m-field">
      <label>サブカテゴリ</label>
      <div class="chips" id="pm-sub-chips"></div>
    </div>
    <div class="m-field">
      <label>作戦</label>
      <select id="pm-proj"><option value="">紐づけない</option></select>
    </div>
    <div class="m-field">
      <label>優先度</label>

    </div>
    <div class="m-actions">
      <button class="btn-cancel" onclick="closePromoteModal()">もどる</button>
      <button class="btn-commit" onclick="confirmPromote()">昇格させる ⚔️</button>
    </div>
  </div>
</div>

  <div class="m-box">

    </div>
    <div class="m-field">
      <label>ひとこと</label>
      <textarea id="pjm-desc" rows="2" placeholder="例：スコア100を切って仲間とラウンドを楽しむ"></textarea>
    </div>
    <div class="m-field">
      <label>夢に紐づける（任意）</label>
      <select id="pjm-dream"><option value="">紐づけない</option></select>
    </div>
    <div class="m-actions">
      <button class="btn-cancel" onclick="closeProjModal()">もどる</button>
      <button class="btn-commit" id="pjm-save" onclick="saveProj()" disabled>立案する</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="m-overlay" id="st-overlay" onclick="if(event.target===this)closeSettings()">
  <div class="m-sheet">
    <div class="m-title">⚙ 設定</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <div style="font-size:10px;font-weight:700;color:var(--faint);letter-spacing:.09em;text-transform:uppercase;">このアプリのURL</div>
      <div class="st-url-box" id="st-url-display"></div>
      <button class="st-copy-btn" onclick="copyUrl()">URLをコピー</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <div style="font-size:10px;font-weight:700;color:var(--faint);letter-spacing:.09em;text-transform:uppercase;">ブックマークに追加する方法</div>
      <div class="st-steps">
        <div class="st-step"><div class="st-step-num">1</div><div class="st-step-text">SafariでこのアプリのURLを開く</div></div>
        <div class="st-step"><div class="st-step-num">2</div><div class="st-step-text">画面下の共有ボタン（□↑）をタップ</div></div>
        <div class="st-step"><div class="st-step-num">3</div><div class="st-step-text">「ブックマークを追加」をタップ</div></div>
      </div>
    </div>
    <button class="btn-cancel" style="width:100%;text-align:center;padding:12px;" onclick="closeSettings()">閉じる</button>
  </div>
</div>

<script>
const SK_Q='lifemap_q_v3', SK_D='lifemap_d_v3', SK_P='lifemap_p_v3', SK_I='lifemap_i_v3';

const QUEST_TYPES=[
  {id:'armor',  label:'⚔️ 装備',    cls:'type-armor',  subs:['トップス','ボトムス','アウター','シューズ','バッグ','アクセサリー','帽子','時計','その他']},
  {id:'weapon', label:'🪄 武器',    cls:'type-weapon', subs:['ゴルフ','アウトドア','カメラ','ガジェット','スポーツ','音楽','その他']},
  {id:'skill',  label:'📜 スキル',  cls:'type-skill',  subs:['習い事','資格','語学','体験','読書','その他']},
  {id:'dungeon',label:'🏰 ダンジョン',cls:'type-dungeon',subs:['国内旅行','海外旅行','ホテル','スポット','その他']},
  {id:'guild',  label:'🍺 ギルド酒場',cls:'type-guild', subs:['レストラン','カフェ','バー','テイクアウト','その他']},
  {id:'tome',   label:'📖 魔導書',  cls:'type-tome',   subs:['レシピ','動画','本','レッスン','その他']},
];
const REALMS=[
  {id:'taste',    label:'Taste',    cls:'realm-taste',    hero:'hero-taste'},
  {id:'narrative',label:'Narrative',cls:'realm-narrative',hero:'hero-narrative'},
  {id:'ajito',    label:'Ajito',    cls:'realm-ajito',    hero:'hero-ajito'},
  {id:'gear',     label:'Gear',     cls:'realm-gear',     hero:'hero-gear'},
  {id:'aura',     label:'Aura',     cls:'realm-aura',     hero:'hero-aura'},
];
const PRIORITIES=[
  {id:'now',    label:'今すぐ',   cls:'pri-now'},
  {id:'soon',   label:'近いうち', cls:'pri-soon'},
  {id:'someday',label:'いつか',   cls:'pri-someday'},
];

let quests=[], dreams=[], projects=[], inbox=[];
let currentTab='all';
let qType='armor', qSub='', qPri='soon', qLinks=[], qImgData='';
let pmType='armor', pmSub='', pmPri='soon', _promoteId=null;
let dRealm='taste', _editDreamId=null, _editQuestId=null;
let _dmProjects=[];

function load(){
  try{quests=JSON.parse(localStorage.getItem(SK_Q))||[];}catch{quests=[];}
  try{dreams=JSON.parse(localStorage.getItem(SK_D))||[];}catch{dreams=[];}
  try{projects=JSON.parse(localStorage.getItem(SK_P))||[];}catch{projects=[];}
  try{inbox=JSON.parse(localStorage.getItem(SK_I))||[];}catch{inbox=[];}
}
function saveQ(){localStorage.setItem(SK_Q,JSON.stringify(quests));}
function saveD(){localStorage.setItem(SK_D,JSON.stringify(dreams));}
function saveP(){localStorage.setItem(SK_P,JSON.stringify(projects));}
function saveI(){localStorage.setItem(SK_I,JSON.stringify(inbox));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtPrice(p){return p?'¥'+Number(p).toLocaleString():'';}
function fmtDate(iso){return new Date(iso).toLocaleDateString('ja-JP',{month:'short',day:'numeric'});}
function getFavicon(url){try{return`https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=32`;}catch{return null;}}
function getDomain(url){try{return new URL(url).hostname.replace('www.','');}catch{return null;}}

function setTab(t,el){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render(){
  const q=document.getElementById('hdr-search').value.toLowerCase();
  const list=document.getElementById('card-list');
  const empty=document.getElementById('empty');
  const activeQ=quests.filter(x=>!x.done).length;
  const total=quests.filter(x=>!x.done&&x.price).reduce((s,x)=>s+Number(x.price),0);
  document.getElementById('app-sub').textContent=`${activeQ} quests${total>0?'  ·  ¥'+total.toLocaleString():''}`;

  if(currentTab==='dreams'){renderDreams(q,list,empty);return;}
  if(currentTab==='inbox'){renderInbox(q,list,empty);return;}
  if(currentTab==='projects'){renderProjects(q,list,empty);return;}

  let visible=quests.filter(x=>{
    if(currentTab!=='all'&&x.type!==currentTab)return false;
    if(q&&!x.title.toLowerCase().includes(q)&&!(x.memo||'').toLowerCase().includes(q))return false;
    return true;
  });

  if(visible.length===0){
    list.innerHTML='';empty.style.display='block';
    document.getElementById('empty-icon').textContent='⚔️';
    document.getElementById('empty-text').innerHTML=q?'該当する記録がありません。':'「＋」から冒険を始めよう。';
    return;
  }
  empty.style.display='none';

  let html='';
  const active=visible.filter(x=>!x.done);
  const done=visible.filter(x=>x.done);

  if(currentTab==='all'){
    // Show all projects (even those with no active quests) + their quests
    projects.forEach(p=>{
      const dream=dreams.find(d=>d.id===p.dreamId);
      const realm=dream?REALMS.find(r=>r.id===dream.realm):null;
      const its=active.filter(x=>x.projId===p.id);
      const doneIts=done.filter(x=>x.projId===p.id);
      html+=`<div class="quest-section">
        <div style="background:var(--paper);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:12px;padding:11px 13px;margin-bottom:8px;">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
            <div style="flex:1;min-width:0;">
              <div style="font-size:14px;font-weight:700;color:var(--ink);line-height:1.3">${esc(p.name)}</div>
              ${p.desc?`<div style="font-size:12px;color:var(--muted);margin-top:2px;line-height:1.5">${esc(p.desc)}</div>`:''}
              <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;">
                ${dream?`<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.04em" class="quest-tag ${realm?realm.cls:'realm-gear'}">${realm?realm.label+' — ':''} ${esc(dream.title)}</span>`:'<span style="font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(184,146,74,.1);color:var(--gold);border:1px solid rgba(184,146,74,.2);font-weight:600">単独作戦</span>'}
                <span style="font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(0,0,0,.05);color:var(--muted);border:1px solid var(--line)">${its.length} active</span>
              </div>
            </div>
            <div style="display:flex;gap:5px;flex-shrink:0;">
              <button class="quest-edit" onclick="editProj('${p.id}')">✎</button>
              <button class="btn-sm gold" style="font-size:10px;padding:4px 9px" onclick="openQuestForProjId('${p.id}')">＋</button>
              <button class="quest-sec-toggle" onclick="toggleSec('sec-${p.id}','tog-${p.id}')" id="tog-${p.id}" style="background:none;border:none;color:var(--faint);cursor:pointer;font-size:12px;padding:0 2px;">▶</button>
            </div>
          </div>
        </div>
        <div class="quest-list collapsed" id="sec-${p.id}">
          ${its.length===0&&doneIts.length===0?`<div style="font-size:12px;color:var(--faint);padding:8px 4px">クエストがまだありません</div>`:''}
          ${its.map(renderQCard).join('')}
        </div>
      </div>`;
    });
    const free=active.filter(x=>!x.projId);
    if(free.length>0){
      html+=`<div class="quest-section">
        <div class="quest-sec-hdr" onclick="toggleSec('sec-free','tog-free')">
          <span class="quest-sec-badge" style="background:rgba(184,146,74,.1);color:var(--gold)">✦ 自由なクエスト</span>
          <span class="quest-sec-count">${free.length}</span>
          <span class="quest-sec-toggle" id="tog-free">▼</span>
        </div>
        <div class="quest-list" id="sec-free">${free.map(renderQCard).join('')}</div>
      </div>`;
    }
    if(projects.length===0&&free.length===0){
      list.innerHTML='';empty.style.display='block';
      document.getElementById('empty-icon').textContent='⚔️';
      document.getElementById('empty-text').innerHTML='「＋ 作戦」から作戦を立案して、<br>「＋」でクエストを記録しよう。';
      return;
    }
  } else {
    // flat by subcat
    const type=QUEST_TYPES.find(t=>t.id===currentTab);
    const subs=type?type.subs:[];
    const noSub=active.filter(x=>!x.subCat);
    if(noSub.length>0)html+=noSub.map(renderQCard).join('');
    subs.forEach(s=>{
      const its=active.filter(x=>x.subCat===s);
      if(!its.length)return;
      html+=`<div style="font-size:10px;font-weight:700;color:var(--faint);letter-spacing:.09em;text-transform:uppercase;margin:14px 0 6px 2px">${esc(s)}</div>`;
      html+=its.map(renderQCard).join('');
    });
  }

  if(done.length>0){
    html+=`<div class="quest-section" style="margin-top:8px">
      <div class="quest-sec-hdr" onclick="toggleSec('sec-done','tog-done')">
        <span class="quest-sec-badge" style="background:rgba(0,0,0,.05);color:var(--faint)">✓ 達成済み</span>
        <span class="quest-sec-count">${done.length}</span>
        <span class="quest-sec-toggle" id="tog-done">▶</span>
      </div>
      <div class="quest-list collapsed" id="sec-done">${done.map(renderQCard).join('')}</div>
    </div>`;
  }
  list.innerHTML=html;
}

function renderQCard(x){
  const type=QUEST_TYPES.find(t=>t.id===x.type);
  const pri=PRIORITIES.find(p=>p.id===x.priority);
  const links=x.links||[];
  return`<div class="quest-card ${x.done?'done':''}" onclick="editQuest('${x.id}')" style="cursor:pointer;">
    <div class="quest-card-top">
      <button class="quest-check ${x.done?'done':''}" onclick="event.stopPropagation();toggleQuest('${x.id}')">${x.done?'✓':''}</button>
      <div class="quest-body">
        <div class="quest-title">${esc(x.title)}</div>
        ${x.price?`<div class="quest-price">${fmtPrice(x.price)}</div>`:''}
        <div class="quest-tags">
          ${type?`<span class="quest-tag ${type.cls}">${type.label}</span>`:''}
          ${x.subCat?`<span class="quest-tag" style="background:rgba(0,0,0,.05);color:var(--muted);border:1px solid var(--line)">${esc(x.subCat)}</span>`:''}
          ${pri?`<span class="quest-tag ${pri.cls}">${pri.label}</span>`:''}
        </div>
      </div>
      <div class="quest-actions">
        <button class="quest-del" onclick="event.stopPropagation();deleteQuest('${x.id}')">×</button>
      </div>
    </div>
    ${x.memo?`<div class="quest-memo">${esc(x.memo)}</div>`:''}
    ${x.imgData?`<div class="quest-img"><img src="${x.imgData}" alt=""></div>`:''}
    ${links.length>0?`<div class="quest-links">${links.map(u=>`
      <a class="quest-link" href="${esc(u)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">
        ${getFavicon(u)?`<img src="${getFavicon(u)}" width="13" height="13" onerror="this.style.display='none'" alt="">`:''}
        <span class="quest-link-domain">${esc(getDomain(u)||u)}</span>
        <span style="color:var(--faint);flex-shrink:0">↗</span>
      </a>`).join('')}</div>`:''}
    <div class="quest-date">${fmtDate(x.createdAt)}</div>
  </div>`;
}

function renderDreams(q,list,empty){
  const visible=dreams.filter(d=>!q||d.title.toLowerCase().includes(q)||(d.desc||'').toLowerCase().includes(q));
  if(visible.length===0){
    list.innerHTML='';empty.style.display='block';
    document.getElementById('empty-icon').textContent='🗺';
    document.getElementById('empty-text').innerHTML='夢がまだ記されていません。<br>「夢を記す」から始めよう。';
    return;
  }
  empty.style.display='none';
  list.innerHTML=visible.map(d=>{
    const realm=REALMS.find(r=>r.id===d.realm)||REALMS[0];
    const dProjs=projects.filter(p=>p.dreamId===d.id);
    const dq=quests.filter(x=>dProjs.some(p=>p.id===x.projId));
    const doneQ=dq.filter(x=>x.done).length;
    return`<div class="dream-card">
      <div class="dream-hero ${realm.hero}">
        ${d.img?`<img class="dream-hero-img" src="${esc(d.img)}" alt="" onerror="this.style.display='none'">`:''}
        <div class="dream-hero-overlay"></div>
        <span class="dream-realm-badge">${realm.label}</span>
        <div class="dream-title">${esc(d.title)}</div>
      </div>
      <div class="dream-body">
        ${d.desc?`<div class="dream-desc">${esc(d.desc)}</div>`:''}
        ${dProjs.length>0?`<div style="margin-bottom:10px;display:flex;flex-wrap:wrap;gap:5px">
          ${dProjs.map(p=>`<span style="font-size:11px;background:rgba(184,146,74,.1);color:var(--gold);border:1px solid rgba(184,146,74,.2);border-radius:20px;padding:3px 9px;font-weight:600">${esc(p.name)}</span>`).join('')}
        </div>`:''}
        <div class="dream-footer">
          <span class="dream-quest-stat">${dq.length>0?`${doneQ}/${dq.length} quests`:'no quests yet'}</span>
          <div class="dream-btns">
            <button class="btn-sm danger" onclick="deleteDream('${d.id}')">削除</button>
            <button class="btn-sm ghost" onclick="editDream('${d.id}')">編集</button>
            <button class="btn-sm gold" onclick="openQuestForProj('${d.id}')">＋ クエスト</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderProjects(q,list,empty){
  const visible=projects.filter(p=>!q||p.name.toLowerCase().includes(q)||(p.desc||'').toLowerCase().includes(q));
  if(visible.length===0){
    list.innerHTML=`<div style="text-align:center;padding:20px 0">
      <button class="btn-commit" onclick="openProjModal()" style="padding:12px 24px">＋ 作戦を立案する</button>
    </div>`;
    empty.style.display='none';return;
  }
  empty.style.display='none';
  list.innerHTML=`<div style="text-align:right;margin-bottom:10px">
    <button class="btn-hdr" onclick="openProjModal()">＋ 立案する</button>
  </div>`+visible.map(p=>{
    const dream=dreams.find(d=>d.id===p.dreamId);
    const realm=dream?REALMS.find(r=>r.id===dream.realm):null;
    const pq=quests.filter(x=>x.projId===p.id);
    const doneQ=pq.filter(x=>x.done).length;
    return`<div class="quest-card" style="margin-bottom:10px;border-left:3px solid var(--gold)">
      <div class="quest-card-top">
        <div class="quest-body">
          <div class="quest-title" style="font-size:15px">${esc(p.name)}</div>
          ${p.desc?`<div style="font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5">${esc(p.desc)}</div>`:''}
          <div class="quest-tags" style="margin-top:6px">
            ${dream?`<span class="quest-tag ${realm?realm.cls:'realm-gear'}">${realm?realm.label+' — ':''} ${esc(dream.title)}</span>`:'<span class="quest-tag" style="background:rgba(184,146,74,.1);color:var(--gold);border:1px solid rgba(184,146,74,.2)">独立作戦</span>'}
            <span class="quest-tag" style="background:rgba(0,0,0,.05);color:var(--muted);border:1px solid var(--line)">${doneQ}/${pq.length} quests</span>
          </div>
        </div>
        <div class="quest-actions">
          <button class="quest-edit" onclick="editProj('${p.id}')">✎</button>
          <button class="quest-del" onclick="deleteProj('${p.id}')">×</button>
        </div>
      </div>
      <div style="display:flex;gap:7px;padding-left:0;margin-top:4px">
        <button class="btn-sm gold" onclick="openQuestForProjId('${p.id}')">＋ クエスト</button>
      </div>
      <div class="quest-date">${fmtDate(p.createdAt)}</div>
    </div>`;
  }).join('');
}

function renderInbox(q,list,empty){
  const visible=inbox.filter(x=>!q||x.title.toLowerCase().includes(q));
  if(visible.length===0){
    list.innerHTML='';empty.style.display='block';
    document.getElementById('empty-icon').textContent='📋';
    document.getElementById('empty-text').innerHTML='手配書は空です。<br>気になったものをとりあえず書き留めよう。';
    // Show add button
    list.innerHTML=`<div style="text-align:center;padding:20px 0">
      <button class="btn-commit" onclick="openInboxModal()" style="padding:12px 24px">＋ 書き留める</button>
    </div>`;
    empty.style.display='none';
    return;
  }
  empty.style.display='none';
  list.innerHTML=`<div style="text-align:right;margin-bottom:10px">
    <button class="btn-hdr" onclick="openInboxModal()">＋ 書き留める</button>
  </div>`+
  visible.map(x=>{
    const domain=getDomain(x.url);
    const favicon=x.url?getFavicon(x.url):null;
    return`<div class="inbox-card">
      <div class="inbox-card-top">
        <div class="inbox-body">
          <div class="inbox-title">${esc(x.title)}</div>
          ${x.memo?`<div style="font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5">${esc(x.memo)}</div>`:''}
          ${x.url?`<a class="quest-link" href="${esc(x.url)}" target="_blank" rel="noopener noreferrer" style="margin:6px 0 0">
            ${favicon?`<img src="${favicon}" width="13" height="13" onerror="this.style.display='none'" alt="">`:''}
            <span class="quest-link-domain">${esc(domain||x.url)}</span>
            <span style="color:var(--faint);flex-shrink:0">↗</span>
          </a>`:''}
          <div class="inbox-date">${fmtDate(x.createdAt)}</div>
        </div>
        <div class="inbox-actions">
          <button class="btn-sm gold" onclick="openPromoteModal('${x.id}')">昇格 ⚔️</button>

// image
function handleImgUpload(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    // compress
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const max=800;
      let w=img.width,h=img.height;
      if(w>max){h=Math.round(h*max/w);w=max;}
      if(h>max){w=Math.round(w*max/h);h=max;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      qImgData=canvas.toDataURL('image/jpeg',0.7);
      document.getElementById('qm-img-el').src=qImgData;
      document.getElementById('qm-img-preview').style.display='block';
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
