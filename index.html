<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Life Map</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life Map">
<meta name="theme-color" content="#1E1A14">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Sans+JP:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --ink:     #1E1A14;
  --parch:   #F4EDD8;
  --parch2:  #EAE0C4;
  --paper:   #FAF6EC;
  --line:    #D8CBA8;
  --gold:    #B8924A;
  --gold-lt: #CFA85E;
  --muted:   #8A7E64;
  --faint:   #B0A07C;

  --taste:    #9B6B8A;
  --narrative:#4A7A6A;
  --ajito:    #5A6E9A;
  --gear:     #8A6A3A;
  --aura:     #9A5A4A;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--parch);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  background-image:
    url("data:image/svg+xml,%3Csvg width='200' height='200' viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
}

/* ── HEADER ── */
#hdr {
  background: var(--ink);
  padding: 18px 18px 14px;
  position: sticky; top: 0; z-index: 30;
}
#hdr-inner { max-width: 680px; margin: 0 auto; }
#hdr-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; gap: 10px; }
#app-title {
  font-family: 'Cinzel', serif;
  font-size: 18px; font-weight: 600;
  color: var(--gold-lt);
  letter-spacing: 0.1em;
  line-height: 1.2;
}
#app-sub { font-size: 11px; color: #6A6050; margin-top: 3px; letter-spacing: 0.03em; }
#hdr-btns { display: flex; gap: 7px; flex-shrink: 0; }
.btn-hdr {
  border: 1px solid rgba(184,146,74,0.3);
  color: var(--gold-lt);
  background: rgba(184,146,74,0.08);
  border-radius: 10px; padding: 8px 13px;
  font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  letter-spacing: 0.03em; white-space: nowrap;
}
.btn-hdr.primary {
  background: var(--gold); border-color: var(--gold); color: var(--ink);
}
.btn-hdr.icon {
  padding: 8px 11px; font-size: 15px;
  background: rgba(255,255,255,0.05);
  border-color: rgba(255,255,255,0.1);
  color: #8A7E64;
}

/* ── SETTINGS MODAL ── */
#st-overlay {
  position: fixed; inset: 0;
  background: rgba(20,16,10,0.65);
  z-index: 100; display: none;
  align-items: flex-end; justify-content: center;
  backdrop-filter: blur(3px);
}
#st-overlay.open { display: flex; }
#st-sheet {
  background: var(--paper);
  border-radius: 22px 22px 0 0;
  padding: 22px 18px 44px;
  width: 100%; max-width: 560px;
  display: flex; flex-direction: column; gap: 16px;
}
.st-title {
  font-family: 'Cinzel', serif;
  font-size: 15px; font-weight: 600;
  color: var(--ink); letter-spacing: 0.07em;
}
.st-section { display: flex; flex-direction: column; gap: 8px; }
.st-label {
  font-size: 10px; font-weight: 700;
  color: var(--faint); letter-spacing: 0.09em;
  text-transform: uppercase;
}
.st-url-box {
  background: var(--parch2);
  border: 1px solid var(--line);
  border-radius: 10px; padding: 12px 14px;
  font-size: 13px; color: var(--ink);
  word-break: break-all; line-height: 1.5;
  font-family: monospace;
}
.st-copy-btn {
  width: 100%; padding: 11px;
  background: var(--ink); color: var(--parch);
  border: none; border-radius: 10px;
  font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  letter-spacing: 0.03em;
}
.st-steps {
  background: var(--parch);
  border: 1px solid var(--line);
  border-radius: 10px; padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
}
.st-step {
  display: flex; gap: 10px; align-items: flex-start;
}
.st-step-num {
  width: 22px; height: 22px; min-width: 22px;
  background: var(--gold); color: var(--ink);
  border-radius: 50%; font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.st-step-text { font-size: 12px; color: var(--muted); line-height: 1.6; }
#hdr-search {
  width: 100%; padding: 9px 14px;
  border-radius: 10px; border: none;
  background: rgba(255,255,255,0.06);
  color: #C8B888; font-size: 13px;
  outline: none; font-family: inherit;
}
#hdr-search::placeholder { color: #4A4030; }

/* ── TABS ── */
#tabs-wrap { background: var(--paper); border-bottom: 1px solid var(--line); overflow-x: auto; }
#tabs { max-width: 680px; margin: 0 auto; display: flex; padding: 0 14px; }
.tab {
  padding: 10px 12px; font-size: 12px;
  color: var(--faint); background: none;
  border: none; border-bottom: 2px solid transparent;
  cursor: pointer; font-family: inherit;
  white-space: nowrap; letter-spacing: 0.02em;
  flex-shrink: 0;
}
.tab.active { font-weight: 700; color: var(--ink); border-bottom-color: var(--gold); }

/* ── MAIN ── */
#main { max-width: 680px; margin: 0 auto; padding: 18px 14px 80px; }

/* ── DREAM CARDS ── */
.dream-card {
  border-radius: 16px; margin-bottom: 12px;
  overflow: hidden;
  box-shadow: 0 2px 16px rgba(30,26,20,0.1);
  border: 1px solid var(--line);
}
.dream-hero {
  height: 110px; position: relative;
  display: flex; align-items: flex-end;
  padding: 12px 14px; overflow: hidden;
}
.dream-hero-img {
  position: absolute; inset: 0;
  object-fit: cover; width: 100%; height: 100%;
}
.dream-hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(20,16,10,0.75) 0%, rgba(20,16,10,0.2) 60%, transparent 100%);
}
.dream-realm-badge {
  position: absolute; top: 10px; right: 10px;
  font-family: 'EB Garamond', serif;
  font-size: 11px; letter-spacing: 0.12em;
  color: rgba(255,255,255,0.8);
  background: rgba(0,0,0,0.3);
  border-radius: 20px; padding: 3px 10px;
  z-index: 1;
}
.dream-title {
  font-family: 'Cinzel', serif;
  font-size: 15px; font-weight: 600;
  color: #FAF6EC; position: relative; z-index: 1;
  text-shadow: 0 1px 6px rgba(0,0,0,0.5);
  line-height: 1.3;
}
.dream-body { background: var(--paper); padding: 12px 14px; }
.dream-desc { font-size: 12px; color: var(--muted); line-height: 1.65; margin-bottom: 10px; }
.dream-footer { display: flex; align-items: center; justify-content: space-between; }
.dream-quest-stat { font-size: 11px; color: var(--gold); font-weight: 600; }
.dream-btns { display: flex; gap: 7px; }
.btn-sm {
  font-size: 11px; padding: 5px 11px;
  border-radius: 8px; cursor: pointer;
  font-family: inherit; font-weight: 600;
  letter-spacing: 0.03em;
}
.btn-sm.ghost { background: transparent; border: 1px solid var(--line); color: var(--muted); }
.btn-sm.gold { background: var(--gold); border: none; color: var(--ink); }
.btn-sm.danger { background: transparent; border: 1px solid #E0A090; color: #B05040; }

/* realm hero gradients */
.hero-taste     { background: linear-gradient(135deg, #4A2A44 0%, #9B6B8A 100%); }
.hero-narrative { background: linear-gradient(135deg, #1A3A2A 0%, #4A7A6A 100%); }
.hero-ajito     { background: linear-gradient(135deg, #1A2A4A 0%, #5A6E9A 100%); }
.hero-gear      { background: linear-gradient(135deg, #3A2A1A 0%, #8A6A3A 100%); }
.hero-aura      { background: linear-gradient(135deg, #3A1A14 0%, #9A5A4A 100%); }

/* ── QUEST SECTION ── */
.quest-section { margin-bottom: 18px; }
.quest-sec-hdr {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 9px; cursor: pointer; padding: 2px 0;
}
.quest-sec-badge {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em; padding: 4px 11px;
  border-radius: 20px;
}
.quest-sec-count { font-size: 11px; color: var(--faint); }
.quest-sec-toggle { font-size: 10px; color: var(--faint); margin-left: auto; }
.quest-list { display: flex; flex-direction: column; gap: 8px; }
.quest-list.collapsed { display: none; }

/* ── QUEST CARD ── */
.quest-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 13px;
  padding: 12px 13px;
  display: flex; flex-direction: column; gap: 7px;
  transition: opacity 0.2s;
}
.quest-card.done { opacity: 0.45; }
.quest-card-top { display: flex; align-items: flex-start; gap: 9px; }
.quest-check {
  width: 19px; height: 19px; min-width: 19px;
  border-radius: 5px; border: 1.5px solid var(--line);
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 10px; margin-top: 2px;
  transition: all 0.15s; flex-shrink: 0;
}
.quest-check.done { border-color: #5A8A5A; background: #5A8A5A; }
.quest-body { flex: 1; min-width: 0; }
.quest-title { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.4; word-break: break-word; }
.quest-card.done .quest-title { text-decoration: line-through; color: var(--faint); }
.quest-price { font-size: 13px; font-weight: 700; color: var(--gold); margin-top: 2px; }
.quest-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.quest-tag {
  font-size: 10px; border-radius: 20px;
  padding: 2px 8px; font-weight: 600;
  letter-spacing: 0.04em;
}
.quest-del { background: none; border: none; color: #C4B090; cursor: pointer; font-size: 17px; flex-shrink: 0; padding: 0 2px; }
.quest-edit { background: none; border: none; color: #C4B090; cursor: pointer; font-size: 13px; flex-shrink: 0; padding: 0 4px; }
.quest-memo { font-size: 12px; color: var(--muted); line-height: 1.65; padding-left: 28px; }
.quest-link {
  display: flex; align-items: center; gap: 6px;
  margin-left: 28px; padding: 6px 10px;
  background: var(--parch); border: 1px solid var(--line);
  border-radius: 8px; text-decoration: none;
  color: var(--ink); font-size: 11px; overflow: hidden;
}
.quest-link-domain { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.quest-date { font-size: 10px; color: var(--faint); padding-left: 28px; }

/* quest type colors */
.type-armor    { background: rgba(80,100,160,0.12); color: #506090; border: 1px solid rgba(80,100,160,0.25); }
.type-weapon   { background: rgba(160,80,40,0.12);  color: #904830; border: 1px solid rgba(160,80,40,0.25); }
.type-skill    { background: rgba(80,140,80,0.12);  color: #407840; border: 1px solid rgba(80,140,80,0.25); }
.type-dungeon  { background: rgba(100,70,140,0.12); color: #604888; border: 1px solid rgba(100,70,140,0.25); }
.type-guild    { background: rgba(160,120,40,0.12); color: #907020; border: 1px solid rgba(160,120,40,0.25); }
.type-tome     { background: rgba(60,100,120,0.12); color: #305870; border: 1px solid rgba(60,100,120,0.25); }

/* dream realm colors */
.realm-taste     { background: rgba(155,107,138,0.15); color: var(--taste); }
.realm-narrative { background: rgba(74,122,106,0.15);  color: var(--narrative); }
.realm-ajito     { background: rgba(90,110,154,0.15);  color: var(--ajito); }
.realm-gear      { background: rgba(138,106,58,0.15);  color: var(--gear); }
.realm-aura      { background: rgba(154,90,74,0.15);   color: var(--aura); }

/* priority */
.pri-now    { background: rgba(180,70,40,0.12); color: #B04428; border: 1px solid rgba(180,70,40,0.25); }
.pri-soon   { background: rgba(184,146,74,0.12); color: #8A6020; border: 1px solid rgba(184,146,74,0.25); }
.pri-someday{ background: rgba(80,120,80,0.12); color: #406040; border: 1px solid rgba(80,120,80,0.25); }

/* ── EMPTY ── */
#empty { text-align: center; padding: 60px 20px; }
#empty-icon { font-size: 38px; margin-bottom: 12px; opacity: 0.45; }
#empty-text { font-size: 14px; color: var(--muted); line-height: 1.7; }

/* ── MODAL ── */
.m-overlay {
  position: fixed; inset: 0;
  background: rgba(20,16,10,0.65);
  z-index: 100; display: none;
  align-items: flex-end; justify-content: center;
  backdrop-filter: blur(3px);
}
.m-overlay.open { display: flex; }
.m-sheet {
  background: var(--paper);
  border-radius: 22px 22px 0 0;
  padding: 22px 18px 44px;
  width: 100%; max-width: 560px;
  max-height: 92vh; overflow-y: auto;
  display: flex; flex-direction: column; gap: 13px;
}
.m-title {
  font-family: 'Cinzel', serif;
  font-size: 15px; font-weight: 600;
  color: var(--ink); letter-spacing: 0.07em;
}
.m-field label {
  display: block; font-size: 10px; font-weight: 700;
  color: var(--faint); margin-bottom: 5px;
  letter-spacing: 0.09em; text-transform: uppercase;
}
.m-field input, .m-field textarea, .m-field select {
  width: 100%; padding: 10px 12px;
  border: 1px solid var(--line); border-radius: 10px;
  font-size: 14px; color: var(--ink);
  background: #FFF; outline: none; font-family: inherit;
}
.m-field input:focus, .m-field textarea:focus, .m-field select:focus { border-color: var(--gold); }
.m-field textarea { resize: vertical; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  font-size: 12px; padding: 5px 13px;
  border-radius: 20px; cursor: pointer;
  font-family: inherit; border: 1px solid var(--line);
  background: var(--parch2); color: var(--muted);
  transition: all 0.15s; font-weight: 500;
}
.chip.sel { background: var(--ink); color: var(--parch); border-color: var(--ink); }
.m-actions { display: flex; gap: 9px; justify-content: flex-end; margin-top: 4px; }
.btn-cancel {
  font-size: 14px; padding: 10px 17px;
  border-radius: 10px; background: var(--parch2);
  color: var(--muted); border: none; cursor: pointer; font-family: inherit;
}
.btn-commit {
  font-size: 14px; padding: 10px 20px;
  border-radius: 10px; background: var(--ink);
  color: var(--parch); border: none;
  font-weight: 600; font-family: inherit; cursor: pointer;
}
.btn-commit:disabled { opacity: 0.3; cursor: not-allowed; }

/* dream modal center */
#dm-overlay {
  position: fixed; inset: 0;
  background: rgba(20,16,10,0.65);
  z-index: 100; display: none;
  align-items: center; justify-content: center;
  padding: 20px; backdrop-filter: blur(3px);
}
#dm-overlay.open { display: flex; }
#dm-sheet {
  background: var(--paper); border-radius: 18px;
  padding: 22px 18px; width: 100%; max-width: 460px;
  display: flex; flex-direction: column; gap: 13px;
  max-height: 90vh; overflow-y: auto;
}

/* realm chips */
.realm-chip {
  font-family: 'EB Garamond', serif;
  font-size: 13px; padding: 6px 14px;
  border-radius: 20px; cursor: pointer;
  font-family: inherit; border: 1px solid transparent;
  transition: all 0.15s; opacity: 0.55; font-weight: 600;
  letter-spacing: 0.04em;
}
.realm-chip.sel { opacity: 1; }

/* type chips */
.type-chip {
  font-size: 12px; padding: 6px 13px;
  border-radius: 20px; cursor: pointer;
  font-family: inherit; border: 1px solid var(--line);
  background: var(--parch2); color: var(--muted);
  transition: all 0.15s; font-weight: 500;
  opacity: 0.65;
}
.type-chip.sel { opacity: 1; font-weight: 700; }

/* subcat chips */
.sub-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.sub-chip {
  font-size: 11px; padding: 4px 10px;
  border-radius: 20px; cursor: pointer;
  font-family: inherit; border: 1px solid var(--line);
  background: transparent; color: var(--muted);
  transition: all 0.15s;
}
.sub-chip.sel { background: var(--ink); color: var(--parch); border-color: var(--ink); }
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-inner">
    <div id="hdr-top">
      <div>
        <div id="app-title">✦ Life Map</div>
        <div id="app-sub">—</div>
      </div>
      <div id="hdr-btns">
        <button class="btn-hdr icon" onclick="openSettings()" title="設定">⚙</button>
        <button class="btn-hdr" onclick="openDreamModal()">夢を記す</button>
        <button class="btn-hdr primary" onclick="openQuestModal()">＋ クエスト</button>
      </div>
    </div>
    <input id="hdr-search" type="search" placeholder="記録を探す..." oninput="render()">
  </div>
</div>

<div id="tabs-wrap">
  <div id="tabs">
    <button class="tab active" id="tab-all"    onclick="setTab('all',this)">すべて</button>
    <button class="tab" id="tab-armor"   onclick="setTab('armor',this)">⚔️ 装備</button>
    <button class="tab" id="tab-weapon"  onclick="setTab('weapon',this)">🪄 武器</button>
    <button class="tab" id="tab-skill"   onclick="setTab('skill',this)">📜 スキル</button>
    <button class="tab" id="tab-dungeon" onclick="setTab('dungeon',this)">🏰 ダンジョン</button>
    <button class="tab" id="tab-guild"   onclick="setTab('guild',this)">🍺 ギルド酒場</button>
    <button class="tab" id="tab-tome"    onclick="setTab('tome',this)">📖 魔導書</button>
    <button class="tab" id="tab-dreams"  onclick="setTab('dreams',this)">🗺 夢の地図</button>
  </div>
</div>

<div id="main">
  <div id="card-list"></div>
  <div id="empty" style="display:none">
    <div id="empty-icon">✦</div>
    <div id="empty-text">まだ記録がありません。<br>「＋ クエスト」から冒険を始めよう。</div>
  </div>
</div>

<!-- Quest Modal -->
<div class="m-overlay" id="qm-overlay" onclick="qmOverlayClick(event)">
  <div class="m-sheet">
    <div class="m-title" id="qm-title-label">クエストを記録する</div>
    <div class="m-field">
      <label>タイトル *</label>
      <input id="qm-title" type="text" placeholder="例：白シャツを探す">
    </div>
    <div class="m-field">
      <label>種別</label>
      <div class="chips" id="qm-type-chips"></div>
    </div>
    <div class="m-field" id="qm-sub-field">
      <label>サブカテゴリ</label>
      <div class="sub-chips" id="qm-sub-chips"></div>
    </div>
    <div class="m-field">
      <label>リンク（参考URL）</label>
      <input id="qm-url" type="url" placeholder="https://...">
    </div>
    <div class="m-field">
      <label>価格（円）</label>
      <input id="qm-price" type="number" placeholder="例：24800">
    </div>
    <div class="m-field">
      <label>どの夢のため？</label>
      <select id="qm-dream"><option value="">夢に紐づけない</option></select>
    </div>
    <div class="m-field">
      <label>優先度</label>
      <div class="chips" id="qm-pri-chips"></div>
    </div>
    <div class="m-field">
      <label>メモ</label>
      <textarea id="qm-memo" rows="2" placeholder="思ったこと、感じたことなど..."></textarea>
    </div>
    <div class="m-actions">
      <button class="btn-cancel" onclick="closeQuestModal()">もどる</button>
      <button class="btn-commit" id="qm-save" onclick="saveQuest()" disabled>記録する</button>
    </div>
  </div>
</div>

<!-- Dream Modal -->
<div id="dm-overlay" onclick="dmOverlayClick(event)">
  <div id="dm-sheet">
    <div class="m-title">夢を地図に刻む</div>
    <div class="m-field">
      <label>夢のタイトル *</label>
      <input id="dm-title" type="text" placeholder="例：自然の中に生きる">
    </div>
    <div class="m-field">
      <label>ひとこと</label>
      <textarea id="dm-desc" rows="2" placeholder="例：森の中に家を建て、季節とともに暮らす"></textarea>
    </div>
    <div class="m-field">
      <label>Realm</label>
      <div class="chips" id="dm-realm-chips"></div>
    </div>
    <div class="m-field">
      <label>イメージ画像URL（任意）</label>
      <input id="dm-img" type="url" placeholder="https://...">
    </div>
    <div class="m-actions">
      <button class="btn-cancel" onclick="closeDreamModal()">もどる</button>
      <button class="btn-commit" id="dm-save" onclick="saveDream()" disabled>地図に刻む</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div id="st-overlay" onclick="stOverlayClick(event)">
  <div id="st-sheet">
    <div class="st-title">⚙ 設定</div>
    <div class="st-section">
      <div class="st-label">このアプリのURL</div>
      <div class="st-url-box" id="st-url-display"></div>
      <button class="st-copy-btn" onclick="copyUrl()">URLをコピー</button>
    </div>
    <div class="st-section">
      <div class="st-label">ホーム画面にアイコンを追加する方法</div>
      <div class="st-steps">
        <div class="st-step">
          <div class="st-step-num">1</div>
          <div class="st-step-text">SafariでこのアプリのURLを開く</div>
        </div>
        <div class="st-step">
          <div class="st-step-num">2</div>
          <div class="st-step-text">画面下の共有ボタン（□↑）をタップ</div>
        </div>
        <div class="st-step">
          <div class="st-step-num">3</div>
          <div class="st-step-text">「ホーム画面に追加」をタップ</div>
        </div>
        <div class="st-step">
          <div class="st-step-num">4</div>
          <div class="st-step-text">名前を「Life Map」にして「追加」をタップ</div>
        </div>
      </div>
    </div>
    <button class="btn-cancel" style="width:100%;text-align:center;padding:12px" onclick="closeSettings()">閉じる</button>
  </div>
</div>

<script>
const SK_Q = 'lifemap_q_v2';
const SK_D = 'lifemap_d_v2';

const QUEST_TYPES = [
  { id:'armor',   label:'⚔️ 装備',     cls:'type-armor',
    subs:['トップス','ボトムス','アウター','シューズ','バッグ','アクセサリー','帽子','時計','その他'] },
  { id:'weapon',  label:'🪄 武器',     cls:'type-weapon',
    subs:['ゴルフ','アウトドア','カメラ','ガジェット','スポーツ','音楽','その他'] },
  { id:'skill',   label:'📜 スキル',   cls:'type-skill',
    subs:['習い事','資格','語学','体験','読書','その他'] },
  { id:'dungeon', label:'🏰 ダンジョン',cls:'type-dungeon',
    subs:['国内旅行','海外旅行','ホテル','スポット','その他'] },
  { id:'guild',   label:'🍺 ギルド酒場',cls:'type-guild',
    subs:['レストラン','カフェ','バー','テイクアウト','その他'] },
  { id:'tome',    label:'📖 魔導書',   cls:'type-tome',
    subs:['レシピ','動画','本','レッスン','その他'] },
];

const REALMS = [
  { id:'taste',     label:'Taste',     cls:'realm-taste',     hero:'hero-taste' },
  { id:'narrative', label:'Narrative', cls:'realm-narrative', hero:'hero-narrative' },
  { id:'ajito',     label:'Ajito',     cls:'realm-ajito',     hero:'hero-ajito' },
  { id:'gear',      label:'Gear',      cls:'realm-gear',      hero:'hero-gear' },
  { id:'aura',      label:'Aura',      cls:'realm-aura',      hero:'hero-aura' },
];

const PRIORITIES = [
  { id:'now',     label:'今すぐ',   cls:'pri-now' },
  { id:'soon',    label:'近いうち', cls:'pri-soon' },
  { id:'someday', label:'いつか',   cls:'pri-someday' },
];

let quests = [];
let dreams = [];
let currentTab = 'all';
let qType = 'armor';
let qSub  = '';
let qPri  = 'soon';
let dRealm = 'taste';

function load() {
  try { quests = JSON.parse(localStorage.getItem(SK_Q)) || []; } catch { quests = []; }
  try { dreams = JSON.parse(localStorage.getItem(SK_D)) || []; } catch { dreams = []; }
}
function saveQ() { localStorage.setItem(SK_Q, JSON.stringify(quests)); }
function saveD() { localStorage.setItem(SK_D, JSON.stringify(dreams)); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtPrice(p) { return p ? '¥'+Number(p).toLocaleString() : ''; }
function fmtDate(iso) { return new Date(iso).toLocaleDateString('ja-JP',{month:'short',day:'numeric'}); }
function getFavicon(url) { try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=32`; } catch { return null; } }
function getDomain(url) { try { return new URL(url).hostname.replace('www.',''); } catch { return null; } }

function setTab(t, el) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('hdr-search').value.toLowerCase();
  const list = document.getElementById('card-list');
  const empty = document.getElementById('empty');

  const activeQ = quests.filter(x => !x.done).length;
  const total = quests.filter(x => !x.done && x.price).reduce((s,x)=>s+Number(x.price),0);
  document.getElementById('app-sub').textContent =
    `${activeQ} quests active${total>0 ? '  ·  ¥'+total.toLocaleString() : ''}`;

  if (currentTab === 'dreams') { renderDreams(q, list, empty); return; }

  let visible = quests.filter(x => {
    if (currentTab !== 'all' && x.type !== currentTab) return false;
    if (q && !x.title.toLowerCase().includes(q) && !(x.memo||'').toLowerCase().includes(q)) return false;
    return true;
  });

  if (visible.length === 0) {
    list.innerHTML = ''; empty.style.display = 'block';
    document.getElementById('empty-icon').textContent = '⚔️';
    document.getElementById('empty-text').innerHTML = q ? '該当する記録がありません。' : '「＋ クエスト」から冒険を始めよう。';
    return;
  }
  empty.style.display = 'none';

  // Group: by dream, then ungrouped, then done
  let html = '';
  const active = visible.filter(x => !x.done);
  const done   = visible.filter(x =>  x.done);

  if (currentTab === 'all') {
    // group by dream
    const dreamIds = [...new Set(active.filter(x=>x.dreamId).map(x=>x.dreamId))];
    dreamIds.forEach(did => {
      const d = dreams.find(x=>x.id===did);
      if (!d) return;
      const realm = REALMS.find(r=>r.id===d.realm)||REALMS[0];
      const its = active.filter(x=>x.dreamId===did);
      html += `<div class="quest-section">
        <div class="quest-sec-hdr" onclick="toggleSec('sec-${did}','tog-${did}')">
          <span class="quest-sec-badge ${realm.cls}">${realm.label} — ${esc(d.title)}</span>
          <span class="quest-sec-count">${its.length}</span>
          <span class="quest-sec-toggle" id="tog-${did}">▼</span>
        </div>
        <div class="quest-list" id="sec-${did}">${its.map(renderQCard).join('')}</div>
      </div>`;
    });
    const free = active.filter(x=>!x.dreamId);
    if (free.length>0) {
      html += `<div class="quest-section">
        <div class="quest-sec-hdr" onclick="toggleSec('sec-free','tog-free')">
          <span class="quest-sec-badge" style="background:rgba(184,146,74,0.12);color:var(--gold)">✦ 自由なクエスト</span>
          <span class="quest-sec-count">${free.length}</span>
          <span class="quest-sec-toggle" id="tog-free">▼</span>
        </div>
        <div class="quest-list" id="sec-free">${free.map(renderQCard).join('')}</div>
      </div>`;
    }
  } else {
    // flat list by subcat
    const type = QUEST_TYPES.find(t=>t.id===currentTab);
    const subs = type ? type.subs : [];
    const noSub = active.filter(x=>!x.subCat);
    const subMap = {};
    subs.forEach(s=>{ subMap[s] = active.filter(x=>x.subCat===s); });

    if (noSub.length>0) html += noSub.map(renderQCard).join('');
    subs.forEach(s=>{
      if (!subMap[s] || subMap[s].length===0) return;
      html += `<div style="font-size:10px;font-weight:700;color:var(--faint);letter-spacing:0.09em;text-transform:uppercase;margin:14px 0 6px 2px">${esc(s)}</div>`;
      html += subMap[s].map(renderQCard).join('');
    });
  }

  if (done.length>0) {
    html += `<div class="quest-section" style="margin-top:8px">
      <div class="quest-sec-hdr" onclick="toggleSec('sec-done','tog-done')">
        <span class="quest-sec-badge" style="background:rgba(0,0,0,0.05);color:var(--faint)">✓ 達成済み</span>
        <span class="quest-sec-count">${done.length}</span>
        <span class="quest-sec-toggle" id="tog-done">▶</span>
      </div>
      <div class="quest-list collapsed" id="sec-done">${done.map(renderQCard).join('')}</div>
    </div>`;
  }

  list.innerHTML = html;
}

function renderQCard(x) {
  const type = QUEST_TYPES.find(t=>t.id===x.type);
  const pri  = PRIORITIES.find(p=>p.id===x.priority);
  const domain = getDomain(x.url);
  const favicon = x.url ? getFavicon(x.url) : null;
  return `
  <div class="quest-card ${x.done?'done':''}">
    <div class="quest-card-top">
      <button class="quest-check ${x.done?'done':''}" onclick="toggleQuest('${x.id}')">${x.done?'✓':''}</button>
      <div class="quest-body">
        <div class="quest-title">${esc(x.title)}</div>
        ${x.price?`<div class="quest-price">${fmtPrice(x.price)}</div>`:''}
        <div class="quest-tags">
          ${type?`<span class="quest-tag ${type.cls}">${type.label}</span>`:''}
          ${x.subCat?`<span class="quest-tag" style="background:rgba(0,0,0,0.05);color:var(--muted);border:1px solid var(--line)">${esc(x.subCat)}</span>`:''}
          ${pri?`<span class="quest-tag ${pri.cls}">${pri.label}</span>`:''}
        </div>
      </div>
      <button class="quest-edit" onclick="editQuest('${x.id}')" title="編集">✎</button>
      <button class="quest-del" onclick="deleteQuest('${x.id}')">×</button>
    </div>
    ${x.memo?`<div class="quest-memo">${esc(x.memo)}</div>`:''}
    ${x.url?`<a class="quest-link" href="${esc(x.url)}" target="_blank" rel="noopener noreferrer">
      ${favicon?`<img src="${favicon}" width="13" height="13" onerror="this.style.display='none'" alt="">`:''}
      <span class="quest-link-domain">${esc(domain||x.url)}</span>
      <span style="color:var(--faint);flex-shrink:0">↗</span>
    </a>`:''}
    <div class="quest-date">${fmtDate(x.createdAt)}</div>
  </div>`;
}

function renderDreams(q, list, empty) {
  const visible = dreams.filter(d=>!q||d.title.toLowerCase().includes(q)||(d.desc||'').toLowerCase().includes(q));
  if (visible.length===0) {
    list.innerHTML=''; empty.style.display='block';
    document.getElementById('empty-icon').textContent='🗺';
    document.getElementById('empty-text').innerHTML='夢がまだ記されていません。<br>「夢を記す」から始めよう。';
    return;
  }
  empty.style.display='none';
  list.innerHTML = visible.map(d=>{
    const realm = REALMS.find(r=>r.id===d.realm)||REALMS[0];
    const dq = quests.filter(x=>x.dreamId===d.id);
    const doneQ = dq.filter(x=>x.done).length;
    return `
    <div class="dream-card">
      <div class="dream-hero ${realm.hero}">
        ${d.img?`<img class="dream-hero-img" src="${esc(d.img)}" alt="" onerror="this.style.display='none'">`:''}
        <div class="dream-hero-overlay"></div>
        <span class="dream-realm-badge">${realm.label}</span>
        <div class="dream-title">${esc(d.title)}</div>
      </div>
      <div class="dream-body">
        ${d.desc?`<div class="dream-desc">${esc(d.desc)}</div>`:''}
        <div class="dream-footer">
          <span class="dream-quest-stat">${dq.length>0?`${doneQ}/${dq.length} quests`:'no quests yet'}</span>
          <div class="dream-btns">
            <button class="btn-sm danger" onclick="deleteDream('${d.id}')">削除</button>
            <button class="btn-sm ghost" onclick="editDream('${d.id}')">編集</button>
            <button class="btn-sm gold" onclick="openQuestForDream('${d.id}')">＋ クエスト</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleSec(id, togId) {
  const el = document.getElementById(id);
  const tog = document.getElementById(togId);
  if (!el) return;
  el.classList.toggle('collapsed');
  if (tog) tog.textContent = el.classList.contains('collapsed') ? '▶' : '▼';
}
function toggleQuest(id) {
  quests = quests.map(x=>x.id===id?{...x,done:!x.done}:x);
  saveQ(); render();
}
function deleteQuest(id) {
  if (!confirm('このクエストを削除しますか？')) return;
  quests = quests.filter(x=>x.id!==id);
  saveQ(); render();
}
function deleteDream(id) {
  if (!confirm('この夢を削除しますか？')) return;
  dreams = dreams.filter(d=>d.id!==id);
  quests = quests.map(x=>x.dreamId===id?{...x,dreamId:null}:x);
  saveD(); saveQ(); render();
}

// ── Quest Modal ──
function buildQTypeChips() {
  document.getElementById('qm-type-chips').innerHTML = QUEST_TYPES.map(t=>
    `<button class="type-chip ${t.cls} ${qType===t.id?'sel':''}" onclick="setQType('${t.id}')">${t.label}</button>`
  ).join('');
  buildQSubChips();
}
function setQType(id) { qType=id; qSub=''; buildQTypeChips(); }
function buildQSubChips() {
  const type = QUEST_TYPES.find(t=>t.id===qType);
  const subs = type ? type.subs : [];
  document.getElementById('qm-sub-chips').innerHTML = subs.map(s=>
    `<button class="sub-chip ${qSub===s?'sel':''}" onclick="setQSub('${s}')">${esc(s)}</button>`
  ).join('');
}
function setQSub(s) { qSub = qSub===s?'':s; buildQSubChips(); }
function buildQPriChips() {
  document.getElementById('qm-pri-chips').innerHTML = PRIORITIES.map(p=>
    `<button class="chip ${qPri===p.id?'sel':''}" onclick="setQPri('${p.id}')">${p.label}</button>`
  ).join('');
}
function setQPri(id) { qPri=id; buildQPriChips(); }
function buildDreamSelect(preId) {
  document.getElementById('qm-dream').innerHTML =
    '<option value="">夢に紐づけない</option>' +
    dreams.map(d=>`<option value="${d.id}" ${preId===d.id?'selected':''}>${esc(d.title)}</option>`).join('');
}

let _prefillDreamId = null;
let _editQuestId = null;

function openQuestModal(url) {
  _prefillDreamId = null; _editQuestId = null;
  document.getElementById('qm-title-label').textContent = 'クエストを記録する';
  document.getElementById('qm-save').textContent = '記録する';
  buildDreamSelect(null);
  buildQTypeChips(); buildQPriChips();
  document.getElementById('qm-title').value = '';
  document.getElementById('qm-url').value = url||'';
  document.getElementById('qm-price').value = '';
  document.getElementById('qm-memo').value = '';
  document.getElementById('qm-save').disabled = true;
  document.getElementById('qm-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('qm-title').focus(),100);
}
function openQuestForDream(did) {
  _prefillDreamId = did; _editQuestId = null;
  document.getElementById('qm-title-label').textContent = 'クエストを記録する';
  document.getElementById('qm-save').textContent = '記録する';
  buildDreamSelect(did);
  buildQTypeChips(); buildQPriChips();
  document.getElementById('qm-title').value = '';
  document.getElementById('qm-url').value = '';
  document.getElementById('qm-price').value = '';
  document.getElementById('qm-memo').value = '';
  document.getElementById('qm-save').disabled = true;
  document.getElementById('qm-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('qm-title').focus(),100);
}
function editQuest(id) {
  const x = quests.find(q=>q.id===id);
  if (!x) return;
  _editQuestId = id; _prefillDreamId = null;
  document.getElementById('qm-title-label').textContent = 'クエストを編集する';
  document.getElementById('qm-save').textContent = '更新する';
  qType = x.type||'armor'; qSub = x.subCat||''; qPri = x.priority||'soon';
  buildDreamSelect(x.dreamId);
  buildQTypeChips(); buildQPriChips();
  document.getElementById('qm-title').value = x.title||'';
  document.getElementById('qm-url').value = x.url||'';
  document.getElementById('qm-price').value = x.price||'';
  document.getElementById('qm-memo').value = x.memo||'';
  document.getElementById('qm-dream').value = x.dreamId||'';
  document.getElementById('qm-save').disabled = false;
  document.getElementById('qm-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('qm-title').focus(),100);
}
function closeQuestModal() { document.getElementById('qm-overlay').classList.remove('open'); }
function qmOverlayClick(e) { if(e.target===document.getElementById('qm-overlay')) closeQuestModal(); }

function saveQuest() {
  const title = document.getElementById('qm-title').value.trim();
  if (!title) return;
  if (_editQuestId) {
    quests = quests.map(x => x.id===_editQuestId ? {
      ...x, title,
      type: qType, subCat: qSub,
      url: document.getElementById('qm-url').value.trim(),
      price: document.getElementById('qm-price').value.trim(),
      memo: document.getElementById('qm-memo').value.trim(),
      dreamId: document.getElementById('qm-dream').value || null,
      priority: qPri,
    } : x);
  } else {
    quests.unshift({
      id: Date.now().toString(), title,
      type: qType, subCat: qSub,
      url: document.getElementById('qm-url').value.trim(),
      price: document.getElementById('qm-price').value.trim(),
      memo: document.getElementById('qm-memo').value.trim(),
      dreamId: document.getElementById('qm-dream').value || null,
      priority: qPri, done: false,
      createdAt: new Date().toISOString(),
    });
  }
  saveQ(); render(); closeQuestModal();
}

// ── Dream Modal ──
function buildDRealmChips() {
  document.getElementById('dm-realm-chips').innerHTML = REALMS.map(r=>
    `<button class="chip realm-chip ${r.cls} ${dRealm===r.id?'sel':''}" onclick="setDRealm('${r.id}')">${r.label}</button>`
  ).join('');
}
function setDRealm(id) { dRealm=id; buildDRealmChips(); }
function editDream(id) {
  const d = dreams.find(x=>x.id===id);
  if (!d) return;
  dRealm = d.realm||'taste';
  buildDRealmChips();
  document.getElementById('dm-title').value = d.title||'';
  document.getElementById('dm-desc').value = d.desc||'';
  document.getElementById('dm-img').value = d.img||'';
  document.getElementById('dm-save').disabled = false;
  document.getElementById('dm-save').textContent = '更新する';
  document.getElementById('dm-overlay').classList.add('open');
  document.getElementById('dm-overlay').dataset.editId = id;
  setTimeout(()=>document.getElementById('dm-title').focus(),100);
}
function openDreamModal() {
  dRealm='taste'; buildDRealmChips();
  document.getElementById('dm-title').value='';
  document.getElementById('dm-desc').value='';
  document.getElementById('dm-img').value='';
  document.getElementById('dm-save').disabled=true;
  document.getElementById('dm-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('dm-title').focus(),100);
}
function openDreamModal() {
  dRealm='taste'; buildDRealmChips();
  document.getElementById('dm-title').value='';
  document.getElementById('dm-desc').value='';
  document.getElementById('dm-img').value='';
  document.getElementById('dm-save').disabled=true;
  document.getElementById('dm-save').textContent='地図に刻む';
  document.getElementById('dm-overlay').dataset.editId='';
  document.getElementById('dm-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('dm-title').focus(),100);
}
function closeDreamModal() { document.getElementById('dm-overlay').classList.remove('open'); }
function dmOverlayClick(e) { if(e.target===document.getElementById('dm-overlay')) closeDreamModal(); }
function saveDream() {
  const title = document.getElementById('dm-title').value.trim();
  if (!title) return;
  const editId = document.getElementById('dm-overlay').dataset.editId;
  if (editId) {
    dreams = dreams.map(d => d.id===editId ? {
      ...d, title,
      desc: document.getElementById('dm-desc').value.trim(),
      img: document.getElementById('dm-img').value.trim(),
      realm: dRealm,
    } : d);
  } else {
    dreams.push({
      id: Date.now().toString(), title,
      desc: document.getElementById('dm-desc').value.trim(),
      img: document.getElementById('dm-img').value.trim(),
      realm: dRealm, createdAt: new Date().toISOString(),
    });
  }
  saveD(); render(); closeDreamModal();
}

document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('qm-title').addEventListener('input', function(){
    document.getElementById('qm-save').disabled = !this.value.trim();
  });
  document.getElementById('dm-title').addEventListener('input', function(){
    document.getElementById('dm-save').disabled = !this.value.trim();
  });
});

function checkUrlParam() {
  const params = new URLSearchParams(window.location.search);
  const u = params.get('url');
  if (u) { history.replaceState({},'',window.location.pathname); setTimeout(()=>openQuestModal(decodeURIComponent(u)),300); }
}

function openSettings() {
  document.getElementById('st-url-display').textContent = window.location.origin + window.location.pathname;
  document.getElementById('st-overlay').classList.add('open');
}
function closeSettings() { document.getElementById('st-overlay').classList.remove('open'); }
function stOverlayClick(e) { if(e.target===document.getElementById('st-overlay')) closeSettings(); }
function copyUrl() {
  const url = window.location.origin + window.location.pathname;
  navigator.clipboard.writeText(url).then(()=>{
    const btn = document.querySelector('.st-copy-btn');
    btn.textContent = 'コピーしました ✓';
    setTimeout(()=>{ btn.textContent = 'URLをコピー'; }, 2000);
  });
}

load(); render(); checkUrlParam();
</script>
</body>
</html>
